version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: techstore_db
      POSTGRES_USER: techstore_user
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://techstore_user:1234@db:5432/techstore_db
      SECRET_KEY: clave_secreta_123
      JWT_SECRET_KEY: jwt_secreto_456
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  pgdata:
